[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "llm-local-client"
version = "1.0.0"
description = "Agentic interface to local LLMs with tree-based context management."
authors = [{ name = "Author Name" }]
readme = "README.md"
requires-python = ">=3.8"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
dependencies = [
    "requests>=2.31.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.1.0",
    "flake8>=7.0.0"
]

[tool.setuptools.packages.find]
include = ["llm_local_client", "llm_local_client.*"]

[tool.setuptools.package-data]
"llm_local_client" = ["schemas/*.yaml"]
