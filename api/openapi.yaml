openapi: 3.0.0
info:
  title: LLM Local Client API
  version: 1.0.0
  description: OpenAPI specification for the internal methods exposed by llm-local-client.
paths:
  /prompt:
    post:
      summary: Send prompt to the LLM
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt:
                  type: string
                contextId:
                  type: string
                model:
                  type: string
              required:
                - prompt
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string
                  nodeId:
                    type: string
  /context/{nodeId}:
    get:
      summary: Retrieve a context node
      parameters:
        - in: path
          name: nodeId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Context node details
