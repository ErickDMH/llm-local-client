name: PR Checks

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Lint TypeScript
        run: |
          npm ci
          npm run lint
        working-directory: packages/typescript

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Lint Python
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          flake8 llm_local_client/ tests/
        working-directory: packages/python

  check:
    name: Syntax & Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Check TypeScript (Compile only)
        run: |
          npm ci
          npx tsc --noEmit
        working-directory: packages/typescript

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Check Python (Syntax)
        run: |
          python -m compileall llm_local_client/
        working-directory: packages/python

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Test TypeScript
        run: |
          npm ci
          npm run test
        working-directory: packages/typescript

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Test Python
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
          pytest
        working-directory: packages/python

  coverage:
    name: Run Test Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Coverage TypeScript
        run: |
          npm ci
          npm run coverage
        working-directory: packages/typescript

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Coverage Python
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
          pytest --cov=llm_local_client
        working-directory: packages/python
