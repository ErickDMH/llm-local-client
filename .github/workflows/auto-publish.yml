name: Auto Publish on Merge

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  bump-and-publish:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # We need to checkout main since the PR is merged into main
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Determine Next Version
        id: version
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          # Try to match 'Release: X.Y.Z' in PR body
          EXTRACTED_VERSION=$(echo "$PR_BODY" | grep -oP '(?<=Release:\s)\d+\.\d+\.\d+' || echo "")
          
          if [ -n "$EXTRACTED_VERSION" ]; then
            echo "Found requested version in PR: $EXTRACTED_VERSION"
            echo "NEW_VERSION=$EXTRACTED_VERSION" >> $GITHUB_ENV
          else
            echo "No explicit version found in PR. Bumping patch version."
            cd packages/typescript
            CURRENT_VERSION=$(node -p "require('./package.json').version")
            NEW_VERSION=$(npm version patch --no-git-tag-version)
            # npm version outputs 'v1.0.1', so strip the 'v'
            NEW_VERSION=${NEW_VERSION#v}
            echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          fi

      - name: Update Versions
        run: |
          echo "Updating packages to version $NEW_VERSION"
          
          # Update TypeScript
          cd packages/typescript
          npm version $NEW_VERSION --allow-same-version --no-git-tag-version
          cd ../../
          
          # Update Python pyproject.toml
          sed -i "s/version = \".*\"/version = \"$NEW_VERSION\"/" packages/python/pyproject.toml

      - name: Commit and Push Version Bump
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/typescript/package.json packages/typescript/package-lock.json packages/python/pyproject.toml
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No version changes to commit."
          else
            git commit -m "chore: auto-bump version to $NEW_VERSION"
            git push origin main
          fi

      - name: Copy schemas
        run: |
          cp mcp/mcp.yaml packages/typescript/
          cp api/openapi.yaml packages/typescript/
          mkdir -p packages/python/llm_local_client/schemas
          cp mcp/mcp.yaml packages/python/llm_local_client/schemas/
          cp api/openapi.yaml packages/python/llm_local_client/schemas/

      - name: Publish NPM
        working-directory: packages/typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm ci
          npm run build
          npm publish

      - name: Publish PyPI Build
        working-directory: packages/python
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          python -m build
      
      - name: Publish PyPI Package
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: packages/python/dist/
