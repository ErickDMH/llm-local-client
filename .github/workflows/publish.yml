name: Publish Packages

on:
  release:
    types: [created]

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
      - name: Copy schemas
        run: |
          cp mcp/mcp.yaml packages/typescript/
          cp api/openapi.yaml packages/typescript/
      - run: npm ci
        working-directory: packages/typescript
      - run: npm run build
        working-directory: packages/typescript
      - run: npm publish
        working-directory: packages/typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Copy schemas
        run: |
          mkdir -p packages/python/llm_local_client/schemas
          cp mcp/mcp.yaml packages/python/llm_local_client/schemas/
          cp api/openapi.yaml packages/python/llm_local_client/schemas/
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine
        working-directory: packages/python
      - name: Build package
        run: python -m build
        working-directory: packages/python
      - name: Publish package
        uses: pypa/gh-action-pypi-publish@27b31702a0e7fc50959f5ad993c78deac1bdfc29
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: packages/python/dist/
